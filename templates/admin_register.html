<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Register | JobFinder</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="auth-layout">

    <!-- ADMIN REGISTER CARD -->
    <div class="auth-card admin-card">
        <h2>🛠 Admin Registration</h2>
        <p class="auth-sub">Create admin account</p>

        <form method="post">
            <input
                type="text"
                name="username"
                placeholder="Admin Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">Register</button>
        </form>

        {% if error %}
            <p class="auth-error">{{ error }}</p>
        {% endif %}

        <a href="/admin-login">Already an admin? Login</a>
        <a href="/" class="auth-back">← Back to Home</a>
    </div>

</div>

</body>
</html>

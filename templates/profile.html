<!DOCTYPE html>
<html>
<head>
    <title>User Profile</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="profile-container">

    <h2>Complete Your Profile</h2>

    <form method="post">

        <input type="text"
               name="full_name"
               placeholder="Full Name"
               required>

        <input type="number"
               name="age"
               placeholder="Age"
               required>

        <input type="date"
               name="birth_date"
               required>

        <button type="submit">
            Save Profile
        </button>

    </form>

</div>

</body>
</html>
